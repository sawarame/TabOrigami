<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Geminiをイメージした星のグラデーション（青〜紫〜水色） -->
    <linearGradient id="geminiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4285F4"/>
      <stop offset="40%"  stop-color="#A259FF"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    
    <!-- AIをイメージした明るめのグラデーション背景 -->
    <linearGradient id="aiBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3B2A66"/> <!-- 少し明るめのディープパープル -->
      <stop offset="50%"  stop-color="#253268"/> <!-- インディゴブルー -->
      <stop offset="100%" stop-color="#164366"/> <!-- 深いシアンブルー -->
    </linearGradient>

    <!-- 折り紙の上面フォールド用グラデーション（青系） -->
    <linearGradient id="topFoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- 背景：AIをイメージしたグラデーション -->
  <rect width="128" height="128" rx="28" fill="url(#aiBgGrad)"/>

  <!-- 折り紙ペーパープレーン（1.25倍に拡大） -->
  <!-- 上面フォールド（明るい青系グラデーション） -->
  <polygon points="12,70 64,82 114,26" fill="url(#topFoldGrad)" opacity="0.95"/>
  <!-- 右翼フォールド（シャドウ、濃い青） -->
  <polygon points="64,82 78,114 114,26" fill="#0284C7" opacity="0.85"/>

  <!-- AI Sparkle（Geminiグラデーションの星、メイン） -->
  <path d="M 88,14 Q 88,30 104,30 Q 88,30 88,46 Q 88,30 72,30 Q 88,30 88,14 Z" fill="url(#geminiGrad)"/>
  
  <!-- AI Sparkle（Geminiグラデーションの星、サブ） -->
  <path d="M 108,6 Q 108,12 114,12 Q 108,12 108,18 Q 108,12 102,12 Q 108,12 108,6 Z" fill="url(#geminiGrad)"/>
</svg>
